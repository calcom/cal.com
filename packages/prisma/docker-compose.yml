# this file is a helper to run Cal.com locally
# starts a postgres 18 instance on port 5450 to use as a local db
# override DATABASE_PORT if 5450 is already taken (e.g. WSL2 / Docker Desktop port conflict)
services:
  postgres:
    image: postgres:18
    ports:
      - "${DATABASE_PORT:-5450}:5432" # expose pg on host; override DATABASE_PORT if 5450 is unavailable
    restart: always
    volumes:
      - db_data:/var/lib/postgresql
    environment:
      POSTGRES_DB: "cal-saml"
      POSTGRES_PASSWORD: ""
      POSTGRES_HOST_AUTH_METHOD: trust
    healthcheck:
      test: ["CMD-SHELL", "pg_isready"]
      interval: 10s
      timeout: 5s
      retries: 5
  postgres_is_ready:
    image: postgres
    depends_on:
      postgres:
        condition: service_healthy
volumes:
  db_data:
