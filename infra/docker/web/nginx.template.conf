# This is a sample nginx config file for a web server
# We will copy this file to the nginx config and replace the placeholders and use certbot to generate the ssl certs

# Map to normalize Framer page paths to lowercase and preserve trailing paths, query strings, and fragments
map $request_uri $framer_normalized_uri {
    ~*^/(pricing)(.*)$ /pricing$2;
    ~*^/(contact-us)(.*)$ /contact-us$2;
    ~*^/(google-spam-policy)(.*)$ /google-spam-policy$2;
    ~*^/(about-us)(.*)$ /about-us$2;
    ~*^/(termofuse)(.*)$ /termofuse$2;
    ~*^/(cookie)(.*)$ /cookie$2;
    ~*^/(gdpr-policy)(.*)$ /gdpr-policy$2;
    ~*^/(privacy-policy)(.*)$ /privacy-policy$2;
    ~*^/(yourname)(.*)$ /yourname$2;
    ~*^/(industry)(.*)$ /industry$2;
    ~*^/(use-case)(.*)$ /use-case$2;
    default $request_uri;
}

# This stays in the same file, above the server block
# This stays above the server block
server {
  server_name DOMAIN_PLACEHOLDER app.DOMAIN_PLACEHOLDER www.DOMAIN_PLACEHOLDER;

  client_max_body_size 15M;

  # Next.js Static Assets served directly from disk
  location /_next/static/ {
    alias /var/www/cal-id-static/current/_next/static/;
    expires 1y;
    add_header Cache-Control "public, immutable";
    access_log off;
  }

  location /public/ {
    alias /var/www/cal-id-static/current/public/;
    expires 30d;
    access_log off;
  }

  # Homepage (/) → external Framer site
  location = / {
    add_header Content-Security-Policy "frame-ancestors 'none'" always;
    add_header X-Frame-Options "DENY" always;

    # Allow logged-in user to access the webpage
    set $redirect_to_home 0;
    
    # Check if user has session cookie AND not from app
    if ($http_cookie ~* "__Secure-next-auth\.session-token=") {
        set $redirect_to_home 1;
    }
    
    if ($arg_from = "app") {
        set $redirect_to_home 0;
    }
    
    # Redirect only if conditions are met
    if ($redirect_to_home = 1) {
        return 302 /home;
    }

    proxy_pass https://HOMEPAGE_PLACEHOLDER/;
    proxy_set_header Host HOMEPAGE_PLACEHOLDER;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Original-Host $host;

    proxy_ssl_server_name on;
    proxy_ssl_verify off;
    proxy_redirect off;
}


  # Framer pages → external Framer site (case-insensitive, redirects uppercase to lowercase)
  location ~* ^/(pricing|contact-us|google-spam-policy|about-us|termofuse|cookie|gdpr-policy|privacy-policy|yourname|industry|use-case)(/.*)?$ {
    if ($request_uri != $framer_normalized_uri) {
      return 301 $scheme://$host$framer_normalized_uri;
    }

    add_header Content-Security-Policy "frame-ancestors 'none'" always;
    add_header X-Frame-Options "DENY" always;

    proxy_pass https://HOMEPAGE_PLACEHOLDER$request_uri;
    proxy_set_header Host HOMEPAGE_PLACEHOLDER;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_ssl_server_name on;
    proxy_ssl_verify off;
    proxy_redirect off;
  }


  # API routes → local Next.js app
  location /api/ {
    add_header Content-Security-Policy "frame-ancestors 'none'" always;
    add_header X-Frame-Options "DENY" always;

    proxy_pass http://127.0.0.1:PORT_PLACEHOLDER;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  location ~* ^/(login|signup|apps|auth|availability|bookings|home|event-types|getting-started|settings|teams|workflows|insights|signup) {
    add_header Content-Security-Policy "frame-ancestors 'none'" always;
    add_header X-Frame-Options "DENY" always;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

    # continue with your app logic
    proxy_pass http://127.0.0.1:PORT_PLACEHOLDER;
  }

  # Everything else → local app
  location / {
    add_header Content-Security-Policy "frame-src *" always;

    proxy_pass http://127.0.0.1:PORT_PLACEHOLDER;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  }

  listen 443 ssl;
  ssl_certificate /etc/letsencrypt/live/DOMAIN_PLACEHOLDER/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/DOMAIN_PLACEHOLDER/privkey.pem;
  include /etc/letsencrypt/options-ssl-nginx.conf;
  ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

# API subdomain → local service on port 5555
server {
  listen 443 ssl;
  server_name api.DOMAIN_PLACEHOLDER;

  client_max_body_size 15M;

  location / {
    proxy_pass http://127.0.0.1:5555;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_redirect off;
  }

  ssl_certificate /etc/letsencrypt/live/DOMAIN_PLACEHOLDER/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/DOMAIN_PLACEHOLDER/privkey.pem;
  include /etc/letsencrypt/options-ssl-nginx.conf;
  ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

# Unauthorized subdomains → redirect to app
server {
  listen 443 ssl;
  server_name *.DOMAIN_PLACEHOLDER;

  if ($host !~* ^(app|www)\.DOMAIN_PLACEHOLDER$) {
    return 301 https://app.DOMAIN_PLACEHOLDER$request_uri;
  }

  ssl_certificate /etc/letsencrypt/live/DOMAIN_PLACEHOLDER/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/DOMAIN_PLACEHOLDER/privkey.pem;
  include /etc/letsencrypt/options-ssl-nginx.conf;
  ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

# HTTP → HTTPS Redirection
server {
  if ($host = DOMAIN_PLACEHOLDER) {
    return 301 https://$host$request_uri;
  }

  if ($host ~ ^[^.]+\.DOMAIN_PLACEHOLDER$) {
    return 301 https://$host$request_uri;
  }

  listen 80;
  server_name DOMAIN_PLACEHOLDER *.DOMAIN_PLACEHOLDER;
  return 404;
}