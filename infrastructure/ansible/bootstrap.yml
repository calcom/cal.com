- name: Install Dependencies
  hosts: "{{ target_host }}"
  become: true
  tasks:
    - name: Install aptitude
      apt:
        name: aptitude
        state: latest
        update_cache: true

    - name: Install required system packages
      apt:
        pkg:
          - curl
          - software-properties-common
          - python3-pip
          - virtualenv
          - python3-setuptools
        state: latest
        update_cache: true

    - name: Add Docker GPG apt Key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker Repository
      apt_repository:
        repo: deb https://download.docker.com/linux/ubuntu focal stable
        state: present

    - name: Update apt and install docker-ce
      apt:
        name: docker-ce
        state: latest
        update_cache: true

    - name: Install Docker module for Python
      apt:
        name: python3-docker
        state: present
      become: true

    - name: Start docker daemon
      systemd:
        name: docker
        state: started

- name: Create new Linux User
  hosts: "{{ target_host }}"
  become: yes
  tasks:
    - name: Create new Linux User
      user:
        name: ubuntu
        groups: adm,docker
        append: yes

    - name: Reconnect to server session
      meta: reset_connection

- name: Setup and Clone Repository
  hosts: "{{ target_host }}"
  become: yes
  tasks:
    - name: Ensure target directory exists
      file:
        path: /home/ubuntu/cal.com
        state: directory
        mode: '0755'
        owner: ubuntu
        group: ubuntu

    - name: Clone repository
      git:
        repo: https://github.com/starlinerapp/cal.com.git
        dest: /home/ubuntu/cal.com
        clone: yes
        update: yes
      become_user: ubuntu

- name: Create .env file
  hosts: "{{ target_host }}"
  tasks:
    - name: Create .env file
      template:
        src: templates/.env.j2
        dest: /home/ubuntu/cal.com/.env
        owner: ubuntu
        group: ubuntu
        mode: '0600'

- name: Start application services
  hosts: "{{ target_host }}"
  tasks:
    - name: Start containers
      community.docker.docker_compose_v2:
        project_src: /home/ubuntu/cal.com
        files: "compose.prod.yml"
      register: output
