name: Install playwright binaries
description: "Install playwright, cache and restore if necessary"
inputs:
  skip-install-if-cache-hit:
    description: "Skip playwright install if cache is hit. Use this for jobs that only need to check that cache exists."
    required: false
    default: "false"
runs:
  using: "composite"
  steps:
    - name: Get installed Playwright version
      shell: bash
      id: playwright-version
      run: echo "PLAYWRIGHT_VERSION=$(node -e "console.log(require('./package.json').devDependencies['@playwright/test'])")" >> $GITHUB_ENV

    # When skip-install-if-cache-hit is true, first check if cache exists without downloading (lookup-only mode)
    - name: Check playwright cache (lookup-only)
      if: ${{ inputs.skip-install-if-cache-hit == 'true' }}
      id: playwright-cache-check
      uses: actions/cache/restore@v4
      with:
        path: |
          ~/Library/Caches/ms-playwright
          ~/.cache/ms-playwright
          ${{ github.workspace }}/node_modules/playwright
        key: ${{ runner.os }}-playwright-${{ env.PLAYWRIGHT_VERSION }}
        lookup-only: true

    # Only restore cache if not in skip mode, or if skip mode but cache check missed
    - name: Cache playwright binaries
      if: ${{ inputs.skip-install-if-cache-hit != 'true' || steps.playwright-cache-check.outputs.cache-hit != 'true' }}
      id: playwright-cache
      uses: actions/cache@v4
      with:
        path: |
          ~/Library/Caches/ms-playwright
          ~/.cache/ms-playwright
          ${{ github.workspace }}/node_modules/playwright
        key: ${{ runner.os }}-playwright-${{ env.PLAYWRIGHT_VERSION }}

    - name: Determine if playwright install will run
      id: should-install
      shell: bash
      run: |
        if [[ "${{ inputs.skip-install-if-cache-hit }}" == "true" ]]; then
          cache_hit="${{ steps.playwright-cache-check.outputs.cache-hit }}"
        else
          cache_hit="${{ steps.playwright-cache.outputs.cache-hit }}"
        fi
        if [[ "$cache_hit" == "true" ]]; then
          echo "value=false" >> "$GITHUB_OUTPUT"
        else
          echo "value=true" >> "$GITHUB_OUTPUT"
        fi

    # When the caller uses yarn-install with skip-install-if-cache-hit, node_modules is never
    # materialized on disk if all yarn caches hit (pure lookup). `yarn playwright install` needs
    # node_modules to resolve the playwright bin, so restore it here (and fall back to a full
    # install if that cache also missed) before running the install step.
    - name: Restore node_modules for playwright install
      if: ${{ steps.should-install.outputs.value == 'true' }}
      id: nm-restore
      uses: actions/cache/restore@v4
      with:
        path: |
          **/node_modules/
          !**/.next/node_modules/
        key: ${{ runner.os }}-yarn-nm-cache-${{ hashFiles('yarn.lock', '.yarnrc.yml') }}

    - name: Yarn install (fallback when node_modules cache also missed)
      if: ${{ steps.should-install.outputs.value == 'true' && steps.nm-restore.outputs.cache-hit != 'true' }}
      shell: bash
      run: yarn install --inline-builds
      env:
        YARN_ENABLE_IMMUTABLE_INSTALLS: "false"
        YARN_ENABLE_GLOBAL_CACHE: "false"
        YARN_INSTALL_STATE_PATH: .yarn/ci-cache/install-state.gz
        YARN_NM_MODE: "hardlinks-local"
        HUSKY: "0"

    - name: Yarn playwright install
      if: ${{ steps.should-install.outputs.value == 'true' }}
      shell: bash
      run: yarn playwright install --with-deps
