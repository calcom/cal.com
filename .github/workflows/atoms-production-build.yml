name: Atoms production Build

on:
  workflow_call:

jobs:
  build:
    name: Build Atoms
    permissions:
      contents: read
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: .github
      - uses: ./.github/actions/cache-checkout
      - uses: ./.github/actions/yarn-install
      - name: Cache atoms production build
        uses: actions/cache@v4
        id: cache-atoms-build
        env:
          cache-name: atoms-build
          key-1: ${{ hashFiles('yarn.lock') }}
          key-2: ${{ hashFiles('packages/platform/atoms/**/*.[jt]s', 'packages/platform/atoms/**/*.[jt]sx', 'packages/platform/atoms/*.[jt]s', 'packages/platform/atoms/*.[jt]sx', 'packages/platform/atoms/package.json', '!**/node_modules', '!**/*.test.*', '!**/*.spec.*', '!**/__tests__/**') }}
          key-3: ${{ hashFiles('packages/i18n/**', 'packages/lib/**/*.[jt]s', 'packages/lib/**/*.[jt]sx', 'packages/features/**/*.[jt]s', 'packages/features/**/*.[jt]sx', 'packages/ui/**/*.[jt]s', 'packages/ui/**/*.[jt]sx', 'packages/dayjs/**', 'packages/types/**', 'packages/platform/constants/**/*.[jt]s', 'packages/platform/types/**/*.[jt]s', 'packages/app-store/**/*.[jt]s', 'packages/app-store/**/*.[jt]sx', 'packages/prisma/**/*.[jt]s', 'packages/prisma/**/*.[jt]sx', 'packages/prisma/schema.prisma', 'packages/trpc/**/*.[jt]s', 'packages/trpc/**/*.[jt]sx', 'apps/web/modules/**/*.[jt]s', 'apps/web/modules/**/*.[jt]sx', '!**/node_modules', '!**/*.test.*', '!**/*.spec.*', '!**/__tests__/**') }}
        with:
          path: |
            **/dist/**
          key: ${{ env.cache-name }}-${{ env.key-1 }}-${{ env.key-2 }}-${{ env.key-3 }}
      - name: Run build
        if: steps.cache-atoms-build.outputs.cache-hit != 'true'
        run: |
          export NODE_OPTIONS="--max_old_space_size=8192"
          rm -rf packages/platform/atoms/node_modules
          yarn install
          yarn workspace @calcom/atoms run build-npm
        shell: bash
