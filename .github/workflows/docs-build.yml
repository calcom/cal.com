# This is just to test this file
name: Build

on:
  workflow_call:

jobs:
  build:
    name: Build Docs
    permissions:
      contents: read
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: .github
      - uses: ./.github/actions/cache-checkout
      - name: Cache Docs build
        uses: actions/cache@v4
        id: cache-docs-build
        env:
          cache-name: docs-build
          key-1: ${{ hashFiles('yarn.lock') }}
          key-2: ${{ hashFiles('docs/**.*', '!**/node_modules') }}
        with:
          path: |
            **/docs/**
          key: ${{ env.cache-name }}-${{ env.key-1 }}-${{ env.key-2 }}
      - name: Check API v2 navigation coverage
        working-directory: docs
        shell: bash
        run: |
          set -euo pipefail

          nav=$(jq -r '.navigation.tabs[] | select(.tab=="API v2 Reference") | .. | strings | select(test("^(GET|POST|PUT|PATCH|DELETE) /"))' docs.json)

          if [ -z "$nav" ]; then
            echo "No API v2 navigation entries found in docs.json"
            exit 1
          fi

          dupes=$(echo "$nav" | sort | uniq -d)
          if [ -n "$dupes" ]; then
            echo "Duplicate API v2 navigation entries:"
            echo "$dupes"
            exit 1
          fi

          if ! diff \
            <(jq -r '.paths | to_entries[] | .key as $p | .value | keys[] | select(test("^(get|post|put|patch|delete)$")) | "\(ascii_upcase) \($p)"' api-reference/v2/openapi.json | sort -u) \
            <(echo "$nav" | sort -u); then
            echo "API v2 docs navigation coverage check failed."
            exit 1
          fi
      - name: Run build
        if: steps.cache-docs-build.outputs.cache-hit != 'true'
        working-directory: docs
        run: |
          export NODE_OPTIONS="--max_old_space_size=8192"
          npm install -g mintlify@4.2.87
          mintlify dev &
          sleep 5 # Let it run for 5 seconds
          kill $!
        shell: bash
