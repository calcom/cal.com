name: Build Images
on:
  workflow_run:
    workflows: ["Format Check"]
    types:
      - completed

jobs:
  build-calcom:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Blacksmith Builder
        uses: useblacksmith/setup-docker-builder@v1

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push calcom image
        uses: useblacksmith/build-push-action@v2
        with:
          context: .
          file: Dockerfile
          # TODO: Replace both URLs with your domains
          build-args: |
            NEXT_PUBLIC_WEBAPP_URL=https://cal.starliner.app
            NEXT_PUBLIC_API_V2_URL=https://api.cal.starliner.app
            NEXT_PUBLIC_LICENSE_CONSENT=agree
          push: true
          tags: ghcr.io/${{ github.repository }}/calcom:latest
          platforms: linux/amd64

  build-calcom-api:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Blacksmith Builder
        uses: useblacksmith/setup-docker-builder@v1

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push calcom-api image
        uses: useblacksmith/build-push-action@v2
        with:
          context: .
          file: apps/api/v2/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/calcom-api:latest
          platforms: linux/amd64
