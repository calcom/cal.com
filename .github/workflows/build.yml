name: Build Images
on:
  push:
    branches:
      - main

jobs:
  build-calcom:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push calcom image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          build-args: |
            NEXT_PUBLIC_WEBAPP_URL=https://cal.starliner.dev
            NEXT_PUBLIC_API_V2_URL=https://api.cal.starliner.dev
            NEXT_PUBLIC_LICENSE_CONSENT=agree
          push: true
          tags: ghcr.io/${{ github.repository }}/calcom:latest
          platforms: linux/amd64
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}/calcom:cache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository }}/calcom:cache,mode=max

  build-calcom-api:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push calcom-api image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/v2/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}/calcom-api:latest
          platforms: linux/amd64
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}/calcom-api:cache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository }}/calcom-api:cache,mode=max
