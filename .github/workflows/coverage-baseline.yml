name: Coverage Baseline

on:
  push:
    branches:
      - main
    paths:
      - 'packages/**'
      - 'apps/**'
      - 'vitest.config.mts'
      - '.github/workflows/coverage-baseline.yml'
      - '.github/workflows/unit-tests.yml'
      - '.github/workflows/integration-tests.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  LINGO_DOT_DEV_API_KEY: ${{ secrets.CI_LINGO_DOT_DEV_API_KEY }}

jobs:
  unit-baseline-shard:
    name: Unit Baseline (${{ matrix.shard }}/${{ strategy.job-total }})
    timeout-minutes: 10
    runs-on: blacksmith-4vcpu-ubuntu-2404
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: .github
      - uses: ./.github/actions/cache-checkout
      - uses: ./.github/actions/yarn-install
      - run: yarn prisma generate
      - name: Run Tests
        env:
          VITEST_BLOB_REPORTER: "true"
        run: TZ=UTC yarn vitest run --shard=${{ matrix.shard }}/${{ strategy.job-total }} --coverage
      - name: Upload Vitest blob report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vitest-baseline-blob-${{ matrix.shard }}
          path: ${{ github.workspace }}/.vitest-reports
          include-hidden-files: true
          if-no-files-found: warn
          retention-days: 7

  unit-baseline-merge:
    name: Merge unit coverage baseline
    needs: unit-baseline-shard
    if: needs.unit-baseline-shard.result == 'success'
    timeout-minutes: 10
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4
        with:
          sparse-checkout: .github
      - uses: ./.github/actions/cache-checkout
      - uses: ./.github/actions/yarn-install
      - name: Download Vitest blob reports
        uses: actions/download-artifact@v4
        with:
          pattern: vitest-baseline-blob-*
          merge-multiple: true
          path: ${{ github.workspace }}/.vitest-reports
      - name: Merge reports and coverage
        run: |
          mkdir -p .vitest-reports
          TZ=UTC yarn vitest --merge-reports=.vitest-reports --coverage
      - name: Upload unit coverage baseline
        uses: actions/upload-artifact@v4
        with:
          name: coverage-baseline-unit
          path: ${{ github.workspace }}/coverage/coverage-summary.json
          retention-days: 90
      - name: Write unit coverage summary
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            try {
              const data = JSON.parse(fs.readFileSync('coverage/coverage-summary.json', 'utf8'));
              const t = data.total;
              const metrics = ['statements', 'branches', 'functions', 'lines'];
              let md = '## Unit Coverage Baseline\n\n';
              md += '| Metric | Covered | Total | Percentage |\n';
              md += '|--------|--------:|------:|-----------:|\n';
              for (const m of metrics) {
                md += `| ${m} | ${t[m].covered} | ${t[m].total} | ${t[m].pct}% |\n`;
              }
              md += `\n> Commit: \`${context.sha.slice(0, 7)}\` on \`main\` — ${new Date().toISOString().split('T')[0]}`;
              await core.summary.addRaw(md).write();
            } catch (e) {
              core.warning(`Could not write coverage summary: ${e.message}`);
            }

  integration-baseline:
    name: Integration Coverage Baseline
    timeout-minutes: 20
    runs-on: blacksmith-2vcpu-ubuntu-2404
    env:
      NODE_OPTIONS: --max-old-space-size=4096
      INTEGRATION_TESTS: "true"
      ALLOWED_HOSTNAMES: ${{ vars.CI_ALLOWED_HOSTNAMES }}
      CALENDSO_ENCRYPTION_KEY: ${{ secrets.CI_CALENDSO_ENCRYPTION_KEY }}
      DAILY_API_KEY: ${{ secrets.CI_DAILY_API_KEY }}
      DATABASE_URL: ${{ secrets.CI_DATABASE_URL }}
      DATABASE_DIRECT_URL: ${{ secrets.CI_DATABASE_URL }}
      DEPLOYSENTINEL_API_KEY: ${{ secrets.DEPLOYSENTINEL_API_KEY }}
      E2E_TEST_APPLE_CALENDAR_EMAIL: ${{ secrets.E2E_TEST_APPLE_CALENDAR_EMAIL }}
      E2E_TEST_APPLE_CALENDAR_PASSWORD: ${{ secrets.E2E_TEST_APPLE_CALENDAR_PASSWORD }}
      E2E_TEST_MAILHOG_ENABLED: ${{ vars.E2E_TEST_MAILHOG_ENABLED }}
      GOOGLE_API_CREDENTIALS: ${{ secrets.CI_GOOGLE_API_CREDENTIALS }}
      EMAIL_SERVER_HOST: ${{ secrets.CI_EMAIL_SERVER_HOST }}
      EMAIL_SERVER_PORT: ${{ secrets.CI_EMAIL_SERVER_PORT }}
      EMAIL_SERVER_USER: ${{ secrets.CI_EMAIL_SERVER_USER }}
      EMAIL_SERVER_PASSWORD: ${{ secrets.CI_EMAIL_SERVER_PASSWORD}}
      GOOGLE_LOGIN_ENABLED: ${{ vars.CI_GOOGLE_LOGIN_ENABLED }}
      NEXTAUTH_SECRET: ${{ secrets.CI_NEXTAUTH_SECRET }}
      NEXTAUTH_URL: ${{ secrets.CI_NEXTAUTH_URL }}
      NEXT_PUBLIC_API_V2_URL: ${{ secrets.CI_NEXT_PUBLIC_API_V2_URL }}
      NEXT_PUBLIC_API_V2_ROOT_URL: ${{ secrets.CI_NEXT_PUBLIC_API_V2_ROOT_URL }}
      NEXT_PUBLIC_IS_E2E: ${{ vars.CI_NEXT_PUBLIC_IS_E2E }}
      NEXT_PUBLIC_ORG_SELF_SERVE_ENABLED: ${{ vars.CI_NEXT_PUBLIC_ORG_SELF_SERVE_ENABLED }}
      NEXT_PUBLIC_STRIPE_PUBLIC_KEY: ${{ secrets.CI_NEXT_PUBLIC_STRIPE_PUBLIC_KEY }}
      NEXT_PUBLIC_WEBAPP_URL: ${{ vars.CI_NEXT_PUBLIC_WEBAPP_URL }}
      NEXT_PUBLIC_WEBSITE_URL: ${{ vars.CI_NEXT_PUBLIC_WEBSITE_URL }}
      PAYMENT_FEE_FIXED: ${{ vars.CI_PAYMENT_FEE_FIXED }}
      PAYMENT_FEE_PERCENTAGE: ${{ vars.CI_PAYMENT_FEE_PERCENTAGE }}
      SAML_ADMINS: ${{ secrets.CI_SAML_ADMINS }}
      SAML_DATABASE_URL: ${{ secrets.CI_SAML_DATABASE_URL }}
      STRIPE_PRIVATE_KEY: ${{ secrets.CI_STRIPE_PRIVATE_KEY }}
      STRIPE_CLIENT_ID: ${{ secrets.CI_STRIPE_CLIENT_ID }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.CI_STRIPE_WEBHOOK_SECRET }}
      SENDGRID_API_KEY: ${{ secrets.CI_SENDGRID_API_KEY }}
      SENDGRID_EMAIL: ${{ secrets.CI_SENDGRID_EMAIL }}
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
    services:
      postgres:
        image: postgres:18
        credentials:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: calendso
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      mailhog:
        image: mailhog/mailhog:v1.0.1
        credentials:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
        ports:
          - 8025:8025
          - 1025:1025
    steps:
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: actions/checkout@v4
        with:
          sparse-checkout: .github
      - uses: ./.github/actions/cache-checkout
      - uses: ./.github/actions/yarn-install
      - run: yarn prisma generate
      - uses: ./.github/actions/cache-db
      - name: Run integration tests with coverage
        run: VITEST_MODE=integration yarn vitest run --coverage
      - name: Upload integration coverage baseline
        uses: actions/upload-artifact@v4
        with:
          name: coverage-baseline-integration
          path: ${{ github.workspace }}/coverage/coverage-summary.json
          retention-days: 90
      - name: Write integration coverage summary
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            try {
              const data = JSON.parse(fs.readFileSync('coverage/coverage-summary.json', 'utf8'));
              const t = data.total;
              const metrics = ['statements', 'branches', 'functions', 'lines'];
              let md = '## Integration Coverage Baseline\n\n';
              md += '| Metric | Covered | Total | Percentage |\n';
              md += '|--------|--------:|------:|-----------:|\n';
              for (const m of metrics) {
                md += `| ${m} | ${t[m].covered} | ${t[m].total} | ${t[m].pct}% |\n`;
              }
              md += `\n> Commit: \`${context.sha.slice(0, 7)}\` on \`main\` — ${new Date().toISOString().split('T')[0]}`;
              await core.summary.addRaw(md).write();
            } catch (e) {
              core.warning(`Could not write coverage summary: ${e.message}`);
            }

  publish-badges:
    name: Publish Coverage Badges
    needs: [unit-baseline-merge, integration-baseline]
    if: always() && (needs.unit-baseline-merge.result == 'success' || needs.integration-baseline.result == 'success')
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - name: Download unit coverage baseline
        uses: actions/download-artifact@v4
        with:
          name: coverage-baseline-unit
          path: coverage/unit
        continue-on-error: true

      - name: Download integration coverage baseline
        uses: actions/download-artifact@v4
        with:
          name: coverage-baseline-integration
          path: coverage/integration
        continue-on-error: true

      - name: Generate badge JSON files
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');

            function badgeColor(pct) {
              if (pct >= 80) return 'brightgreen';
              if (pct >= 60) return 'yellow';
              if (pct >= 40) return 'orange';
              return 'red';
            }

            function makeBadge(label, pct) {
              return {
                schemaVersion: 1,
                label,
                message: `${pct.toFixed(1)}%`,
                color: badgeColor(pct),
              };
            }

            fs.mkdirSync('badges', { recursive: true });

            try {
              const unit = JSON.parse(fs.readFileSync('coverage/unit/coverage-summary.json', 'utf8'));
              const unitPct = unit.total.lines.pct;
              fs.writeFileSync('badges/coverage-unit.json', JSON.stringify(makeBadge('unit coverage', unitPct), null, 2));
              core.info(`Unit coverage: ${unitPct}%`);
            } catch (e) {
              core.warning(`No unit coverage data: ${e.message}`);
            }

            try {
              const integration = JSON.parse(fs.readFileSync('coverage/integration/coverage-summary.json', 'utf8'));
              const integrationPct = integration.total.lines.pct;
              fs.writeFileSync('badges/coverage-integration.json', JSON.stringify(makeBadge('integration coverage', integrationPct), null, 2));
              core.info(`Integration coverage: ${integrationPct}%`);
            } catch (e) {
              core.warning(`No integration coverage data: ${e.message}`);
            }

      - name: Deploy badges to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./badges
          destination_dir: badges
          keep_files: true
