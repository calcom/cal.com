# Cloudflare SSL Configuration
# Cloudflare handles SSL/TLS termination, this server only serves HTTP

server {
    listen 80;
    server_name _;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    
    # Note: HSTS handled by Cloudflare
    # Note: SSL handled by Cloudflare

    # Rate limiting
    limit_req zone=api_limit burst=20 nodelay;

    # Proxy to API v2
    location / {
        proxy_pass http://api-v2:80;
        proxy_http_version 1.1;
        
        # Proxy Headers - Important for Cloudflare
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # Cloudflare Real IP (optional - if you want to see actual visitor IPs)
        # Requires: set_real_ip_from directives in nginx.conf
        
        # WebSocket support (if needed)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Buffering
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
    }

    # Health check endpoint (no rate limit)
    location /health {
        limit_req off;
        proxy_pass http://api-v2:80/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }
}

